# Publish betterdb-valkey-search-kit to PyPI
#
# Uses PyPI Trusted Publisher (OIDC) — no API token required.
# Trusted publisher is registered at pypi.org/manage/account/publishing/
#
# Trigger by pushing a tag: valkey-search-kit-py-v0.1.0
#
# Publish this BEFORE betterdb-semantic-cache / betterdb-retrieval /
# betterdb-agent-memory: those wheels carry an unqualified
# `Requires-Dist: betterdb-valkey-search-kit>=0.1.0` resolved from PyPI.

name: Publish Valkey Search Kit (Python)

on:
  push:
    tags:
      - 'valkey-search-kit-py-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      skip_pypi:
        description: 'Skip PyPI publish (dry run)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: packages/valkey-search-kit-py
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/valkey-search-kit-py
        run: pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    # skip_pypi is only populated on workflow_dispatch; on tag push it is null/falsy,
    # so !inputs.skip_pypi is always true for tag events (publish always runs).
    # Dry-run is only available via manual workflow_dispatch with skip_pypi=true.
    if: ${{ !inputs.skip_pypi }}
    environment: pypi
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatchling

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            # valkey-search-kit-py-v0.1.0 → 0.1.0
            echo "version=${GITHUB_REF_NAME#valkey-search-kit-py-v}" >> $GITHUB_OUTPUT
          fi

      - name: Update pyproject.toml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        working-directory: packages/valkey-search-kit-py
        run: |
          python - <<'EOF'
          import re, os, pathlib
          path = pathlib.Path("pyproject.toml")
          content = path.read_text()
          content = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{os.environ["VERSION"]}"',
              content,
              flags=re.MULTILINE,
          )
          path.write_text(content)
          EOF

      - name: Build wheel and sdist
        working-directory: packages/valkey-search-kit-py
        run: python -m build

      - name: Verify build artifacts
        working-directory: packages/valkey-search-kit-py
        run: |
          ls dist/
          test -n "$(ls dist/*.whl 2>/dev/null)"
          test -n "$(ls dist/*.tar.gz 2>/dev/null)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/valkey-search-kit-py/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: valkey-search-kit-py-v${{ steps.version.outputs.version }}
          name: Valkey Search Kit Python v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify PyPI package (with retry)
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          for i in 1 2 3 4 5; do
            if pip install "betterdb-valkey-search-kit==$VERSION" --dry-run --quiet 2>/dev/null; then
              echo "Package betterdb-valkey-search-kit==$VERSION verified"
              exit 0
            fi
            echo "Attempt $i: not yet available, retrying in 30s…"
            sleep 30
          done
          echo "Package not available after 5 attempts"
          exit 1
